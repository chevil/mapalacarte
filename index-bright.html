<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map A La Carte</title>

  <link href="https://unpkg.com/maplibre-gl@4.x/dist/maplibre-gl.css" rel="stylesheet">
  <link href="css/alertify.core.css" rel="stylesheet">
  <link href="css/alertify.default.css" rel="stylesheet">

  <script src="https://unpkg.com/maplibre-gl@4.x/dist/maplibre-gl.js"></script>
  <script src="js/jquery-3.7.1.js"></script>
  <script src="js/alertify.min.js"></script>

  <style>
    body { margin: 0; padding: 0; }
    #map { width: 100vw; height: 100vh; }
    #layyours { position: absolute; top: 50px; left: 20px; background: #ae782355; color: #000000; }
    #themes { position: absolute; top: 10px; left: 20px; background: #ae782355; color: #000000; }
    #paintpropes { position: absolute; z-index: 1000; background: #888888; 
                   border-radius: 20px; padding: 10px; color: #ffffff; display: none;
                   height: 150px; width: 350px; bottom: 50px; right: 50px }
    #save { position: absolute; bottom: 50px; left: 20px }
    #dosave { background: #ae782355; color: #000000; }
  </style>
</head>
<body>

<div id="map"></div>
<select id="layyours"></select>
<div id="paintpropes"></div>
<div id="save">
<input id="mapname" type="text" cols=40 placeholder="Map Name" />
<input id="dosave" type="submit" value="Save this Map" />
</div>
<div id="themes">
    <input id="liberty" type="radio" name="ctheme" value="liberty">
    <label for="liberty">Liberty</label>
    <input id="bright" type="radio" name="ctheme" value="bright" checked="checked">
    <label for="bright">Bright</label>
    <input id="positron" type="radio" name="ctheme" value="positron">
    <label for="positron">Positron</label>
</div>

<script>

let map = null;
let paint = null;
let lastlayer = null;
let gustom = '';
let pustom = '    ';
let addXode = '';
let gtheme = 'bright';

var strstr = function (haystack, needle) {
  if (needle.length === 0) return -1;
  for (let i = 0; i <= haystack.length - needle.length; i++) {
    if (needle === haystack.substring(i, i + needle.length)) {
      return i;
    }
  }
  return -1;
};

function postIt(e) {
  const mapname = document.getElementById( "mapname");
  if ( mapname.value == '' || mapname.value == null ) {
     alertify.alert( "Please, fill in the Map Name" );
     return false;
  }
  $.post('save-map.php', 
        {
          name: mapname.value,
          gustom : gustom,
          theme : gtheme
        }
  ).done( function(location){  
             alertify.alert('Map saved here : <a target="_blank" href="' + location + '">'+location+'</a><br> \
                             Use the source code of this page or only the marked CUSTOM CODE in your project.<br/> \
                             Enjoy and thanks or donations to <a target="_blank" href="https://giss.tv">GISS.tv</a>');
  }).fail( function(xhr, status, error) {
             alertify.alert('Couldn\'t save your map<br/>Error : ' + error);
  });
}

function applyPropes(e) {

  try {
      for (var key in paint) {
        let value = document.querySelector('input[name='+key+']').value;
        console.log( key + " ==> " + value );
        addXode = pustom+'setValue("'+lastlayer+'", "'+key+'", "'+value+'" );\n';
        setValue(lastlayer,key,value);
        gustom += addXode;
      }

  } catch (e) {
    console.error(e);
    alertify.alert("Couldn't update the Map, Operation Ignored; Try Again " + e);
  }
  document.querySelector('#paintpropes').innerHTML = '';
  document.querySelector('#paintpropes').style.display = 'none';
  // alert(gustom);
}
    
function setValue(layer, key, value) {

      if ( value == 'true' ) {
          map.setPaintProperty(layer, key, true);
      }
      else if ( value == 'false' ) {
          map.setPaintProperty(layer, key, false);
      }
      else if ( strstr( key, 'opacity' ) >= 0 ||
                  strstr( key, 'blur' ) >= 0 ||
                  strstr( key, 'width' ) >= 0 ) { // accepts float
          if ( strstr( value, 'interpolate' ) >= 0 ) { // accepts interpolation expression
            // build expression if necessary
            let expression = null;
            if ( strstr( value, 'interpolate' ) >= 0 ) { // accepts interpolation expression
               var varray = value.split(',');
               if ( varray[1] == 'linear' ) {
                 var vdata = varray.slice(3);
                 expression = [
                   varray[0],
                   [varray[1]],
                   [varray[2]],
                   ...vdata.flatMap((v, i, arr ) =>
                      (i%2 == 0) ? [ parseFloat(v), parseFloat(arr[i+1]) ] : [] 
                   )
                 ];
               } else if ( varray[1] == 'exponential' ) {
                 var vdata = varray.slice(4);
                 expression = [
                   varray[0],
                   [varray[1], parseFloat(varray[2])],
                   [varray[3]],
                   ...vdata.flatMap((v, i, arr ) =>
                      (i%2 == 0) ? [ parseFloat(v), parseFloat(arr[i+1]) ] : [] 
                   )
                 ];
               } else {
                 throw new Error("Unknown Expression");
               }
            }
            map.setPaintProperty(layer, key, expression);
            var nvalue = map.getPaintProperty(layer, key );
            if ( nvalue != value ) {
               throw new Error("Wrong Parameter");
            }
          } else { // accepts float
            map.setPaintProperty(layer, key, parseFloat(value));
            var nvalue = map.getPaintProperty(layer, key );
            if ( nvalue != parseFloat(value) ) {
               throw new Error("Wrong Parameter");
            }
          }
      } 
      else if ( strstr(key, 'color' ) >= 0 ) { 
          if ( strstr( value, 'interpolate' ) >= 0 ) { // accepts interpolation expression
            // build expression if necessary
            let expression = null;
            if ( strstr( value, 'interpolate' ) >= 0 ) { // accepts interpolation expression
               var varray = value.split(',');
               if ( varray[1] == 'linear' ) {
                 var vdata = varray.slice(3);
                 expression = [
                   varray[0],
                   [varray[1]],
                   [varray[2]],
                   ...vdata.flatMap((v, i, arr ) =>
                      (i%2 == 0) ? [ parseFloat(v), arr[i+1] ] : [] 
                   )
                 ];
               } else if ( varray[1] == 'exponential' ) {
                 var vdata = varray.slice(4);
                 expression = [
                   varray[0],
                   [varray[1], parseFloat(varray[2])],
                   [varray[3]],
                   ...vdata.flatMap((v, i, arr ) =>
                      (i%2 == 0) ? [ parseFloat(v), arr[i+1] ] : [] 
                   )
                 ];
               } else {
                 throw new Error("Unknown Expression");
               }
            }
            map.setPaintProperty(layer, key, expression);
            var nvalue = map.getPaintProperty(layer, key );
            if ( nvalue != value ) {
               throw new Error("Wrong Parameter");
            }
          } else { // accepts string
            map.setPaintProperty(layer, key, value);
            var nvalue = map.getPaintProperty(layer, key );
            if ( nvalue != value ) {
               throw new Error("Wrong Parameter");
            }
          }
      }
      else if ( strstr(key, 'dash' ) >= 0 ) { // accepts number array
          var varray = JSON.parse("[" + value + "]");
          map.setPaintProperty(layer, key, varray);
          var nvalue = map.getPaintProperty(layer, key );
          if ( nvalue != value ) {
             throw new Error("Wrong Parameter");
          }
      }
      else { // try anyway to see if it accepts string
          map.setPaintProperty(layer, key, value);
          var nvalue = map.getPaintProperty(layer, key );
          if ( nvalue != value ) {
             throw new Error("Wrong Parameter");
          }
      }
      map.setLayoutProperty(layer, "visibility", "visible");
      gustom += pustom+'map.setLayoutProperty("'+layer+'", "visibility", "visible");\n';
}

function selectLayer(option) {

  console.log("option : " + option.target.value );
  lastlayer = option.target.value;

  // suppress layer first
  map.setLayoutProperty(lastlayer, 'visibility', 'none');
  gustom += pustom+'map.setLayoutProperty("'+lastlayer+'", "visibility", "none");\n';

  // option 1 : getting the big map style
  let styleJson = map.getStyle();
  // console.log( 'this is the map layers style : ' + JSON.stringify(styleJson.layers) );
  let layers = styleJson.layers;
  for (layer in layers ) {
    // console.log( 'another heavy layer : ' + JSON.stringify(layers[layer].id));
    if ( layers[layer].id.toString() == option.target.value.toString() ) {
       paint = layers[layer].paint;
    }
  }
  console.log( 'here is the paint : ' + JSON.stringify(paint) );

  let temele = '<center>'+lastlayer+'</center>';
  temele += '<form onsubmit="applyPropes(); return false;" id="propresForm"><table width=100%>';
  for (var key in paint) {
       temele += '<tr><td>'+key+'</td>';
       temele += '<td><input type=text value="'+paint[key]+'" name="'+key+'"></input></td></tr>';
  }
  temele += '<tr><td colspan=2 align=center><input type=submit value="Set"></input></td></tr>';
  temele += '</table></form>';
  document.querySelector('#paintpropes').innerHTML = temele;
  document.querySelector('#paintpropes').style.display = 'block';

  // option 2 : getting the layer style, but it returns undefined
  // let layer = map.getLayer(option);
  // console.log( 'this is the layer : ' + JSON.stringify(layer) );
  // let paint = layer.getPaintAffectingGlobalStateRefs(); 
  // console.log( 'this is the layer paint : ' + JSON.stringify(paint) );

  return false;
}

document.addEventListener('DOMContentLoaded', function() {

  const dosave = document.getElementById("dosave");
  dosave.addEventListener('click', postIt);

  // arm theme chooser
  const themeList = document.getElementById('themes');
  const themes = themeList.getElementsByTagName('input');
  for (const theme of themes) {
     theme.onclick = (theme) => {
         // hide all layers
         updateLayers();
         gustom = '';
         gtheme = theme.target.id;
         console.log( 'Theme set to :' + gtheme );
         createMap();
     };
  }

  createMap();

});

function createMap() {

  console.log('create map');

  $("#map").innerHTML = "";

  map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/'+gtheme,
    center: [2.1686, 41.3874],
    zoom: 4
  });

  // Add navigation controls (zoom, compass)
  map.addControl(new maplibregl.NavigationControl());

  // Hide layers once the map is loaded
  map.on('load', () => {
    console.log('onload');
    updateLayers();
  });

}

function updateLayers() {

    const layers = map.getStyle().layers;
    const layyours = document.getElementById("layyours");
    $("#layyours").empty();
    for (const layer of layers) {
       map.setLayoutProperty(layer.id, 'visibility', 'none');
       // console.log(layer.id );
       var opt = document.createElement("option"); 
       opt.text = layer.id;
       opt.value = layer.id
       layyours.options.add(opt);
    }
    map.setLayoutProperty('background', 'visibility', 'visible');
    layyours.addEventListener('change', selectLayer);
    gustom += pustom+'const layers = map.getStyle().layers;\n';
    gustom += pustom+'for (const layer of layers) {\n';
    gustom += pustom+'   map.setLayoutProperty(layer.id, "visibility", "none");\n';
    gustom += pustom+'}\n';
    gustom += pustom+'map.setLayoutProperty("background", "visibility", "visible");\n';
    // console.log(layers);
    // console.log(layers.map(l => l.id));
}

</script>

</body>
</html>
